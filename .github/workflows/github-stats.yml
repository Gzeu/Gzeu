name: Generate GitHub Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Stats Card
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            async function fetchSVG(url) {
              const https = require('https');
              return new Promise((resolve, reject) => {
                https.get(url, (res) => {
                  let data = '';
                  res.on('data', chunk => data += chunk);
                  res.on('end', () => resolve(data));
                  res.on('error', reject);
                });
              });
            }

            const statsUrl = 'https://github-readme-stats.vercel.app/api?username=Gzeu&show_icons=true&theme=tokyonight&hide_border=true&count_private=true';
            const langsUrl = 'https://github-readme-stats.vercel.app/api/top-langs/?username=Gzeu&layout=compact&theme=tokyonight&hide_border=true&langs_count=8';

            if (!fs.existsSync('assets')) fs.mkdirSync('assets');

            try {
              const statsSvg = await fetchSVG(statsUrl);
              fs.writeFileSync('assets/stats.svg', statsSvg);
              console.log('Stats SVG saved');
            } catch(e) {
              console.log('Failed to fetch stats:', e.message);
            }

            try {
              const langsSvg = await fetchSVG(langsUrl);
              fs.writeFileSync('assets/top-langs.svg', langsSvg);
              console.log('Top langs SVG saved');
            } catch(e) {
              console.log('Failed to fetch langs:', e.message);
            }

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/stats.svg assets/top-langs.svg || true
          git diff --staged --quiet || git commit -m "chore: update GitHub stats [skip ci]"
          git push || true
