name: Generate GitHub Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install -y librsvg2-bin

      - name: Fetch and convert stats
        run: |
          mkdir -p assets

          STATS_URL="https://github-readme-stats.vercel.app/api?username=Gzeu&show_icons=true&theme=tokyonight&hide_border=true&count_private=true"
          LANGS_URL="https://github-readme-stats.vercel.app/api/top-langs/?username=Gzeu&layout=compact&theme=tokyonight&hide_border=true&langs_count=8"

          # Fetch SVGs
          curl -sL "$STATS_URL" -o assets/stats.svg || echo "Failed to fetch stats"
          curl -sL "$LANGS_URL" -o assets/top-langs.svg || echo "Failed to fetch langs"

          # Convert SVG to PNG using rsvg-convert
          if [ -f assets/stats.svg ]; then
            rsvg-convert -w 500 assets/stats.svg -o assets/stats.png && echo "Stats PNG created" || echo "Failed to convert stats"
          fi
          if [ -f assets/top-langs.svg ]; then
            rsvg-convert -w 380 assets/top-langs.svg -o assets/top-langs.png && echo "Langs PNG created" || echo "Failed to convert langs"
          fi

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/ || true
          git diff --staged --quiet || git commit -m "chore: update GitHub stats [skip ci]"
          git push || true
