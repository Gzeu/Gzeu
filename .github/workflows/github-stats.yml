name: Generate GitHub Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Stats with GitHub API
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const username = 'Gzeu';

            const query = `
              query {
                user(login: "${username}") {
                  contributionsCollection {
                    totalCommitContributions
                    totalPullRequestContributions
                    totalIssueContributions
                    restrictedContributionsCount
                  }
                  repositories(first: 100, ownerAffiliations: OWNER, isFork: false) {
                    nodes {
                      stargazerCount
                      primaryLanguage { name color }
                    }
                    totalCount
                  }
                  followers { totalCount }
                }
              }
            `;

            const result = await github.graphql(query);
            const user = result.user;
            const cc = user.contributionsCollection;
            const totalCommits = cc.totalCommitContributions + cc.restrictedContributionsCount;
            const totalPRs = cc.totalPullRequestContributions;
            const totalIssues = cc.totalIssueContributions;
            const totalRepos = user.repositories.totalCount;
            const totalStars = user.repositories.nodes.reduce((a, r) => a + r.stargazerCount, 0);
            const year = new Date().getFullYear();

            // Count languages
            const langMap = {};
            user.repositories.nodes.forEach(r => {
              if (r.primaryLanguage) {
                const n = r.primaryLanguage.name;
                const c = r.primaryLanguage.color || '#888';
                if (!langMap[n]) langMap[n] = { count: 0, color: c };
                langMap[n].count++;
              }
            });
            const totalLR = Object.values(langMap).reduce((a, v) => a + v.count, 0);
            const topLangs = Object.entries(langMap)
              .sort((a, b) => b[1].count - a[1].count)
              .slice(0, 8)
              .map(([name, { count, color }]) => ({ name, percent: ((count / totalLR) * 100).toFixed(1), color }));

            // Stats SVG
            const statsSvg = [
              '<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195">',
              '<style>text{font-family:"Segoe UI",Ubuntu,sans-serif}.lb{fill:#8b949e;font-size:13px}.vl{fill:#c9d1d9;font-size:13px;font-weight:600}.ti{fill:#58a6ff;font-size:17px;font-weight:700}</style>',
              '<rect x="0.5" y="0.5" rx="4.5" width="494" height="194" fill="#1a1b27" stroke="#444"/>',
              '<text x="25" y="35" class="ti">Gzeu&#39;s GitHub Stats</text>',
              '<text x="25" y="80" class="lb">&#11088; Total Stars Earned:</text><text x="295" y="80" class="vl">' + totalStars + '</text>',
              '<text x="25" y="105" class="lb">&#128230; Total Commits (' + year + '):</text><text x="295" y="105" class="vl">' + totalCommits + '</text>',
              '<text x="25" y="130" class="lb">&#128257; Total PRs:</text><text x="295" y="130" class="vl">' + totalPRs + '</text>',
              '<text x="25" y="155" class="lb">&#128027; Total Issues:</text><text x="295" y="155" class="vl">' + totalIssues + '</text>',
              '<text x="25" y="180" class="lb">&#128193; Public Repos:</text><text x="295" y="180" class="vl">' + totalRepos + '</text>',
              '</svg>'
            ].join('');

            // Top Langs SVG
            const barW = 415;
            let xOff = 0;
            const bars = topLangs.map(l => {
              const w = Math.max(1, Math.round((parseFloat(l.percent) / 100) * barW));
              const bar = '<rect x="' + xOff + '" y="0" width="' + w + '" height="8" rx="3" fill="' + l.color + '"/>';
              xOff += w;
              return bar;
            }).join('');

            const legendItems = topLangs.map((l, i) => {
              const col = i % 2;
              const row = Math.floor(i / 2);
              return '<g transform="translate(' + (col * 210) + ',' + (row * 25) + ')"><circle cx="5" cy="5" r="5" fill="' + l.color + '"/><text x="18" y="10" class="lb">' + l.name + ' ' + l.percent + '%</text></g>';
            }).join('');

            const langH = 90 + Math.ceil(topLangs.length / 2) * 25;
            const langsSvg = [
              '<svg xmlns="http://www.w3.org/2000/svg" width="445" height="' + langH + '" viewBox="0 0 445 ' + langH + '">',
              '<style>text{font-family:"Segoe UI",Ubuntu,sans-serif}.lb{fill:#8b949e;font-size:12px}.ti{fill:#58a6ff;font-size:17px;font-weight:700}</style>',
              '<rect x="0.5" y="0.5" rx="4.5" width="444" height="' + (langH - 1) + '" fill="#1a1b27" stroke="#444"/>',
              '<text x="25" y="35" class="ti">Most Used Languages</text>',
              '<g transform="translate(15,55)">' + bars + '</g>',
              '<g transform="translate(15,75)">' + legendItems + '</g>',
              '</svg>'
            ].join('');

            if (!require('fs').existsSync('assets')) require('fs').mkdirSync('assets');
            fs.writeFileSync('assets/stats.svg', statsSvg);
            fs.writeFileSync('assets/top-langs.svg', langsSvg);
            console.log('SVGs generated successfully');

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/stats.svg assets/top-langs.svg
          git diff --staged --quiet || git commit -m "chore: update GitHub stats [skip ci]"
          git push || true
