name: Generate GitHub Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Stats SVGs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const path = require('path');
            const fs = require('fs');
            const workspace = process.env.GITHUB_WORKSPACE || '.';
            const assetsDir = path.join(workspace, 'assets');
            if (!fs.existsSync(assetsDir)) fs.mkdirSync(assetsDir, { recursive: true });

            const q = `query { user(login: "Gzeu") { contributionsCollection { totalCommitContributions totalPullRequestContributions totalIssueContributions restrictedContributionsCount } repositories(first: 100, ownerAffiliations: OWNER, isFork: false) { nodes { stargazerCount primaryLanguage { name color } } totalCount } } }`;
            const data = await github.graphql(q);
            const u = data.user;
            const cc = u.contributionsCollection;
            const commits = cc.totalCommitContributions + cc.restrictedContributionsCount;
            const prs = cc.totalPullRequestContributions;
            const issues = cc.totalIssueContributions;
            const repos = u.repositories.totalCount;
            const stars = u.repositories.nodes.reduce((a, r) => a + r.stargazerCount, 0);
            const yr = new Date().getFullYear();
            console.log({commits, prs, issues, repos, stars});

            const lm = {};
            u.repositories.nodes.forEach(r => {
              if (r.primaryLanguage) {
                const n = r.primaryLanguage.name;
                const c = r.primaryLanguage.color || '#888888';
                if (!lm[n]) lm[n] = {count:0, color:c};
                lm[n].count++;
              }
            });
            const tot = Object.values(lm).reduce((a,v)=>a+v.count,0);
            const langs = Object.entries(lm).sort((a,b)=>b[1].count-a[1].count).slice(0,8)
              .map(([name,{count,color}])=>({name, pct:((count/tot)*100).toFixed(1), color}));
            console.log('langs:', langs.map(l=>l.name+' '+l.pct+'%'));

            const TF = 'font-family="Arial,sans-serif" font-size="13" fill="#c9d1d9"';
            const LF = 'font-family="Arial,sans-serif" font-size="13" fill="#8b949e"';
            const HF = 'font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#58a6ff"';

            const mkRow = (y, label, val) =>
              '<text x="25" y="'+y+'" '+LF+'>'+label+'</text><text x="265" y="'+y+'" '+TF+' font-weight="bold">'+String(val)+'</text>';

            const statsSvg = '<?xml version="1.0" encoding="UTF-8"?>' +
              '<svg xmlns="http://www.w3.org/2000/svg" width="495" height="200" viewBox="0 0 495 200">' +
              '<rect width="495" height="200" rx="6" fill="#0d1117"/>' +
              '<text x="25" y="40" '+HF+'>Gzeu GitHub Stats</text>' +
              mkRow(85, 'Stars Earned:', stars) +
              mkRow(110, 'Commits ('+yr+'):', commits) +
              mkRow(135, 'Pull Requests:', prs) +
              mkRow(160, 'Issues:', issues) +
              mkRow(185, 'Public Repos:', repos) +
              '</svg>';

            fs.writeFileSync(path.join(assetsDir,'stats.svg'), statsSvg, 'utf8');
            console.log('stats.svg ok, len='+statsSvg.length);

            const bw = 440;
            let xo = 0;
            const bars = langs.map(l=>{
              const w = Math.max(1, Math.round((parseFloat(l.pct)/100)*bw));
              const s = '<rect x="'+xo+'" y="0" width="'+w+'" height="8" rx="3" fill="'+l.color+'"/>';
              xo+=w;
              return s;
            }).join('');

            const LF2 = 'font-family="Arial,sans-serif" font-size="12" fill="#8b949e"';
            const legend = langs.map((l,i)=>{
              const cx = (i%2)*220+15;
              const cy = Math.floor(i/2)*24;
              return '<circle cx="'+(cx+5)+'" cy="'+(cy+77)+'" r="5" fill="'+l.color+'"/>'+
                     '<text x="'+(cx+16)+'" y="'+(cy+82)+'" '+LF2+'>'+l.name+' '+l.pct+'%</text>';
            }).join('');

            const lh = 72 + Math.ceil(langs.length/2)*24 + 10;
            const langsSvg = '<?xml version="1.0" encoding="UTF-8"?>' +
              '<svg xmlns="http://www.w3.org/2000/svg" width="470" height="'+lh+'" viewBox="0 0 470 '+lh+'">' +
              '<rect width="470" height="'+lh+'" rx="6" fill="#0d1117"/>' +
              '<text x="20" y="35" '+HF+'>Most Used Languages</text>' +
              '<g transform="translate(15,55)">'+bars+'</g>' +
              legend +
              '</svg>';

            fs.writeFileSync(path.join(assetsDir,'top-langs.svg'), langsSvg, 'utf8');
            console.log('top-langs.svg ok, len='+langsSvg.length);

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/stats.svg assets/top-langs.svg
          git diff --staged --quiet || git commit -m "chore: update GitHub stats [skip ci]"
          git push || true
